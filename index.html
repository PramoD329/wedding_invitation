<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(to right, #ffe0ec, #e0f7fa);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Card */
.card {
    background: #fff;
    padding: 30px;
    border-radius: 20px;
    width: 400px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

/* Title */
.title {
    font-family: 'Great Vibes', cursive;
    font-size: 38px;
    color: #c2185b;
}

/* Image */
.couple-img img {
    width: 220px;
    height: 260px;
    object-fit: cover;
    border-radius: 15px;
    border: 4px solid #c2185b;
    margin: 20px 0;
}

/* Names */
.names {
    font-size: 22px;
    font-weight: 600;
}

.heart {
    color: red;
}

/* Details */
.details {
    color: #555;
    margin: 10px 0;
}

/* Date */
.date {
    font-size: 18px;
    font-weight: bold;
    color: #6a1b9a;
}

/* Button */
.location-btn {
    margin-top: 20px;
    display: inline-block;
    padding: 12px 20px;
    background: #c2185b;
    color: white;
    text-decoration: none;
    border-radius: 25px;
}

.location-btn:hover {
    background: #880e4f;
}

.footer {
    margin-top: 15px;
    font-size: 14px;
    color: #777;
}
</style>
</head>

<body>

<div class="card">
    <div class="title">Wedding Invitation</div>

    <!-- Your Uploaded Image -->
    <div class="couple-img">
        <img src="couple.jpg" alt="Virat & Anushka">
    </div>

    <div class="names">
        Virat Kohli ❤ Anushka Sharma
    </div>

    <div class="details">
        Together with their families,<br>
        invite you to celebrate their wedding
    </div>

    <div class="date">
        Tuesday, June 23rd, 2026<br>
        6:00 PM onwards
    </div>

    <div class="details">
        Kalyana Mandapam
    </div>

    <a class="location-btn" href="https://maps.app.goo.gl/jBtJvcU9hRHt7oEH7" target="_blank">
        📍 View Location
    </a>

    <div class="footer">
        We look forward to your presence ❤️
    </div>
</div>

</body>
</html>
