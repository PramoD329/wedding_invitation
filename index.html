<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Poppins', sans-serif;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #ffdde1, #ee9ca7);
    overflow: hidden;
}

/* Floating background circles */
body::before, body::after {
    content: "";
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    animation: float 8s infinite ease-in-out;
}

body::before {
    width: 300px;
    height: 300px;
    top: 10%;
    left: 10%;
}

body::after {
    width: 200px;
    height: 200px;
    bottom: 10%;
    right: 10%;
    animation-delay: 2s;
}

@keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-30px); }
}

/* Glass card */
.card {
    width: 380px;
    padding: 25px;
    border-radius: 20px;
    background: rgba(255,255,255,0.25);
    backdrop-filter: blur(12px);
    box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    text-align: center;
    color: #333;
}

/* Title */
.title {
    font-family: 'Great Vibes', cursive;
    font-size: 42px;
    color: #b0003a;
    margin-bottom: 10px;
}

/* Image */
.couple-img img {
    width: 100%;
    height: 250px;
    object-fit: cover;
    border-radius: 15px;
    margin: 15px 0;
    box-shadow: 0 5px 20px rgba(0,0,0,0.3);
}

/* Names */
.names {
    font-size: 22px;
    font-weight: 600;
    margin: 10px 0;
}

.names span {
    color: red;
}

/* Details */
.details {
    font-size: 14px;
    margin: 8px 0;
}

/* Date */
.date {
    font-size: 18px;
    font-weight: bold;
    color: #6a1b9a;
    margin: 10px 0;
}

/* Button */
.location-btn {
    display: inline-block;
    margin-top: 15px;
    padding: 12px 25px;
    background: linear-gradient(45deg, #ff4081, #c2185b);
    color: white;
    text-decoration: none;
    border-radius: 30px;
    transition: 0.3s;
}

.location-btn:hover {
    transform: scale(1.1);
    box-shadow: 0 5px 20px rgba(0,0,0,0.3);
}

.footer {
    margin-top: 12px;
    font-size: 13px;
    color: #555;
}
</style>
</head>

<body>

<div class="card">

    <div class="title">Wedding Invitation</div>

    <div class="couple-img">
        <img src="couple.jpg" alt="Virat & Anushka">
    </div>

    <div class="names">
        Virat Kohli <span>❤</span> Anushka Sharma
    </div>

    <div class="details">
        Together with their families invite you to celebrate their wedding
    </div>

    <div class="date">
        June 23rd, 2026 • 6:00 PM
    </div>

    <div class="details">
        Kalyana Mandapam
    </div>

    <a class="location-btn" href="https://maps.app.goo.gl/jBtJvcU9hRHt7oEH7" target="_blank">
        📍 View Location
    </a>

    <div class="footer">
        We look forward to your presence 💖
    </div>

</div>

</body>
</html>
